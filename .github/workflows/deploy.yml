name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: "--accept-routes"

      - name: Trigger Coolify Deploy via API
        run: |
          curl --fail -X GET \
            "http://coolify-ubuntu-4gb-nbg1-1.tail252f40.ts.net/api/v1/deploy?uuid=hri8r1ebcsc1zff5vy56ve20&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
